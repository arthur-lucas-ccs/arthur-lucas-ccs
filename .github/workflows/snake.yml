name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23D4843E&color_dots[0]=%23F5E6D8&color_dots[1]=%23E8B98A&color_dots[2]=%23C4772A&color_dots[3]=%239B4F14&color_dots[4]=%236B2D08
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23FF9A50&color_dots[0]=%231A0E08&color_dots[1]=%233D200A&color_dots[2]=%237A3B10&color_dots[3]=%23B55A1E&color_dots[4]=%23D4843E

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
