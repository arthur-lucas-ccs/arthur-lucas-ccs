name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=D4843E&color_dots[0]=F5E6D8&color_dots[1]=E8B98A&color_dots[2]=C4772A&color_dots[3]=9B4F14&color_dots[4]=6B2D08
            dist/github-contribution-grid-snake-dark.svg?color_snake=FF9A50&color_dots[0]=1A0E08&color_dots[1]=3D200A&color_dots[2]=7A3B10&color_dots[3]=B55A1E&color_dots[4]=D4843E

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
