name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=chocolate
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=darkorange

      - name: Apply autumn colors (dark)
        run: |
          sed -i \
            -e 's/#161b22/#1a0e08/g' \
            -e 's/#0e4429/#3d200a/g' \
            -e 's/#006d32/#7a3b10/g' \
            -e 's/#26a641/#b55a1e/g' \
            -e 's/#39d353/#d4843e/g' \
            dist/github-contribution-grid-snake-dark.svg

      - name: Apply autumn colors (light)
        run: |
          sed -i \
            -e 's/#ebedf0/#f5e6d8/g' \
            -e 's/#9be9a8/#e8b98a/g' \
            -e 's/#40c463/#c4772a/g' \
            -e 's/#30a14e/#9b4f14/g' \
            -e 's/#216e39/#6b2d08/g' \
            dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
