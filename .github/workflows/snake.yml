name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=chocolate
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=darkorange

      - name: Apply autumn colors
        run: |
          python3 - <<'PYEOF'
          def apply(path, reps):
              content = open(path).read()
              for old, new in reps.items():
                  content = content.replace(old, new).replace(old.upper(), new)
              open(path, 'w').write(content)
              print(f"Done: {path}")

          apply('dist/github-contribution-grid-snake-dark.svg', {
              '#161b22': '#1a0e08',
              '#0e4429': '#3d200a',
              '#006d32': '#7a3b10',
              '#26a641': '#b55a1e',
              '#39d353': '#d4843e',
          })
          apply('dist/github-contribution-grid-snake.svg', {
              '#ebedf0': '#f5e6d8',
              '#9be9a8': '#e8b98a',
              '#40c463': '#c4772a',
              '#30a14e': '#9b4f14',
              '#216e39': '#6b2d08',
          })
          PYEOF

      - name: Push to output branch
        run: |
          cd dist
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "chore: update snake animation"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:output
